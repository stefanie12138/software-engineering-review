<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440" viewBox="0 0 700 440">
  <rect width="700" height="440" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">博客系统类图</text>

  <!-- User class -->
  <rect x="80" y="70" width="160" height="140" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <rect x="80" y="70" width="160" height="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="160" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">User</text>
  <text x="90" y="112" font-size="12" fill="#333">- username: String</text>
  <text x="90" y="130" font-size="12" fill="#333">- password: String</text>
  <text x="90" y="148" font-size="12" fill="#333">- registerTime: Date</text>
  <line x1="85" y1="158" x2="235" y2="158" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="175" font-size="12" fill="#333">+ publishArticle()</text>
  <text x="90" y="193" font-size="12" fill="#333">+ postComment()</text>

  <!-- Article class -->
  <rect x="460" y="70" width="160" height="120" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <rect x="460" y="70" width="160" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Article</text>
  <text x="470" y="112" font-size="12" fill="#333">- title: String</text>
  <text x="470" y="130" font-size="12" fill="#333">- content: String</text>
  <text x="470" y="148" font-size="12" fill="#333">- publishTime: Date</text>
  <line x1="465" y1="158" x2="615" y2="158" stroke="#ddd" stroke-width="1"/>
  <text x="470" y="175" font-size="12" fill="#333">+ getComments()</text>

  <!-- Comment class -->
  <rect x="270" y="280" width="160" height="100" fill="#fff" stroke="#ef6c00" stroke-width="2"/>
  <rect x="270" y="280" width="160" height="30" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="350" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Comment</text>
  <text x="280" y="322" font-size="12" fill="#333">- content: String</text>
  <text x="280" y="340" font-size="12" fill="#333">- commentTime: Date</text>
  <line x1="275" y1="348" x2="425" y2="348" stroke="#ddd" stroke-width="1"/>
  <text x="280" y="363" font-size="12" fill="#333">+ edit()</text>

  <!-- User -> Article (1..*) -->
  <line x1="240" y1="125" x2="460" y2="125" stroke="#555" stroke-width="1.5"/>
  <text x="300" y="115" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="400" y="115" text-anchor="middle" font-size="12" fill="#333">*</text>
  <text x="350" y="140" text-anchor="middle" font-size="11" fill="#666">发布</text>

  <!-- User -> Comment (1..*) -->
  <line x1="170" y1="210" x2="270" y2="300" stroke="#555" stroke-width="1.5"/>
  <text x="200" y="265" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="250" y="285" text-anchor="middle" font-size="12" fill="#333">*</text>
  <text x="220" y="300" text-anchor="middle" font-size="11" fill="#666">发表</text>

  <!-- Article -> Comment (1..*) -->
  <line x1="540" y1="190" x2="430" y2="300" stroke="#555" stroke-width="1.5"/>
  <text x="500" y="255" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="450" y="275" text-anchor="middle" font-size="12" fill="#333">*</text>
  <text x="480" y="290" text-anchor="middle" font-size="11" fill="#666">拥有</text>

  <!-- User self-association: follow -->
  <path d="M 240 160 C 300 160, 300 80, 200 80" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="280" y="75" text-anchor="middle" font-size="11" fill="#666">关注</text>
  <text x="265" y="95" text-anchor="middle" font-size="12" fill="#333">*</text>
  <text x="230" y="105" text-anchor="middle" font-size="12" fill="#333">*</text>
</svg>