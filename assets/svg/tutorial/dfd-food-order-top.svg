<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340">
  <rect width="700" height="340" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">在线订餐系统 顶层 DFD（上下文图）</text>

  <defs>
    <marker id="darrTop" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- External entities -->
  <rect x="50" y="80" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="100" y="110" text-anchor="middle" font-size="13" fill="#333">顾客</text>

  <rect x="550" y="80" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="600" y="110" text-anchor="middle" font-size="13" fill="#333">商家</text>

  <rect x="300" y="260" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="350" y="290" text-anchor="middle" font-size="13" fill="#333">支付平台</text>

  <!-- Process 0 -->
  <circle cx="350" cy="135" r="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="130" text-anchor="middle" font-size="14" fill="#333">0</text>
  <text x="350" y="150" text-anchor="middle" font-size="13" fill="#333">在线订餐系统</text>

  <!-- Data flows -->
  <line x1="150" y1="100" x2="290" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="220" y="100" text-anchor="middle" font-size="11" fill="#333">订单请求</text>

  <line x1="150" y1="130" x2="290" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="220" y="125" text-anchor="middle" font-size="11" fill="#333">支付信息</text>

  <line x1="290" y1="155" x2="150" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="220" y="170" text-anchor="middle" font-size="11" fill="#333">订单状态</text>

  <line x1="410" y1="110" x2="550" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="480" y="95" text-anchor="middle" font-size="11" fill="#333">订单详情</text>

  <line x1="410" y1="140" x2="550" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="480" y="150" text-anchor="middle" font-size="11" fill="#333">配送信息</text>

  <line x1="550" y1="160" x2="410" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="480" y="175" text-anchor="middle" font-size="11" fill="#333">出餐确认</text>

  <line x1="350" y1="195" x2="350" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="390" y="225" text-anchor="middle" font-size="11" fill="#333">支付请求</text>

  <line x1="320" y1="260" x2="320" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#darrTop)"/>
  <text x="290" y="225" text-anchor="middle" font-size="11" fill="#333">支付结果</text>
</svg>