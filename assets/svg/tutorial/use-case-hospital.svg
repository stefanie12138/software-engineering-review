<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <rect width="600" height="520" fill="#f8f9fa"/>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">医院预约挂号系统用例图</text>

  <defs>
    <marker id="hospOpen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- System boundary -->
  <rect x="130" y="55" width="340" height="440" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="75" text-anchor="middle" font-size="14" fill="#1565c0">医院预约挂号系统</text>

  <!-- Patient Actor -->
  <g transform="translate(60,180)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="27" x2="20" y2="70" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="5" y2="100" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="35" y2="100" stroke="#555" stroke-width="2"/>
  </g>
  <text x="80" y="300" text-anchor="middle" font-size="14" fill="#555">患者</text>

  <!-- Doctor Actor -->
  <g transform="translate(520,180)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="27" x2="20" y2="70" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="5" y2="100" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="35" y2="100" stroke="#555" stroke-width="2"/>
  </g>
  <text x="540" y="300" text-anchor="middle" font-size="14" fill="#555">医生</text>

  <!-- Timer/System Actor (top) -->
  <g transform="translate(280,30)">
    <rect x="0" y="0" width="40" height="25" fill="#e3f2fd" stroke="#555" stroke-width="1.5" rx="3"/>
    <text x="20" y="17" text-anchor="middle" font-size="11" fill="#333">定时任务</text>
  </g>

  <!-- Patient use cases -->
  <ellipse cx="220" cy="130" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="135" text-anchor="middle" font-size="12" fill="#333">注册登录</text>

  <ellipse cx="220" cy="210" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="215" text-anchor="middle" font-size="12" fill="#333">查询医生排班</text>

  <ellipse cx="220" cy="290" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="295" text-anchor="middle" font-size="12" fill="#333">预约挂号</text>

  <ellipse cx="220" cy="370" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="375" text-anchor="middle" font-size="12" fill="#333">取消预约</text>

  <!-- Doctor use case -->
  <ellipse cx="380" cy="200" rx="65" ry="23" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="380" y="205" text-anchor="middle" font-size="12" fill="#333">查看预约列表</text>

  <!-- Timer use case -->
  <ellipse cx="300" cy="110" rx="65" ry="23" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="300" y="115" text-anchor="middle" font-size="12" fill="#333">发送就诊提醒</text>

  <!-- Include use case -->
  <ellipse cx="300" cy="450" rx="65" ry="23" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="300" y="455" text-anchor="middle" font-size="12" fill="#333">验证患者身份信息</text>

  <!-- Association lines -->
  <line x1="130" y1="130" x2="155" y2="130" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="210" x2="155" y2="210" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="290" x2="155" y2="290" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="370" x2="155" y2="370" stroke="#555" stroke-width="1.5"/>

  <line x1="445" y1="200" x2="480" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="300" y1="55" x2="300" y2="87" stroke="#555" stroke-width="1.5"/>

  <!-- Include: 预约挂号 -> 验证患者身份信息 -->
  <line x1="220" y1="313" x2="300" y2="427" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#hospOpen)"/>
  <text x="230" y="380" text-anchor="start" font-size="11" fill="#333">&lt;&lt;include&gt;&gt;</text>
</svg>