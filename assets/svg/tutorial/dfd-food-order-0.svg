<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480">
  <rect width="900" height="480" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">在线订餐系统 0 层 DFD</text>

  <defs>
    <marker id="darr0" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- External entities -->
  <rect x="30" y="100" width="90" height="45" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="75" y="128" text-anchor="middle" font-size="13" fill="#333">顾客</text>

  <rect x="780" y="100" width="90" height="45" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="825" y="128" text-anchor="middle" font-size="13" fill="#333">商家</text>

  <rect x="405" y="410" width="90" height="45" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="438" text-anchor="middle" font-size="13" fill="#333">支付平台</text>

  <!-- Processes -->
  <circle cx="220" cy="130" r="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="125" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="220" y="142" text-anchor="middle" font-size="12" fill="#333">顾客管理</text>

  <circle cx="450" cy="130" r="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="125" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="450" y="142" text-anchor="middle" font-size="12" fill="#333">订单处理</text>

  <circle cx="450" cy="260" r="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="255" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="450" y="272" text-anchor="middle" font-size="12" fill="#333">支付处理</text>

  <circle cx="680" cy="200" r="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="680" y="195" text-anchor="middle" font-size="12" fill="#333">4</text>
  <text x="680" y="212" text-anchor="middle" font-size="12" fill="#333">厨房出餐</text>

  <circle cx="680" cy="330" r="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="680" y="325" text-anchor="middle" font-size="12" fill="#333">5</text>
  <text x="680" y="342" text-anchor="middle" font-size="12" fill="#333">配送管理</text>

  <!-- Data stores -->
  <rect x="120" y="360" width="90" height="45" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="120" y1="370" x2="210" y2="370" stroke="#2e7d32" stroke-width="2"/>
  <line x1="120" y1="405" x2="210" y2="405" stroke="#2e7d32" stroke-width="2"/>
  <text x="165" y="392" text-anchor="middle" font-size="12" fill="#333">D1 菜单库</text>

  <rect x="405" y="360" width="90" height="45" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="405" y1="370" x2="495" y2="370" stroke="#2e7d32" stroke-width="2"/>
  <line x1="405" y1="405" x2="495" y2="405" stroke="#2e7d32" stroke-width="2"/>
  <text x="450" y="392" text-anchor="middle" font-size="12" fill="#333">D2 订单库</text>

  <rect x="690" y="410" width="90" height="45" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="690" y1="420" x2="780" y2="420" stroke="#2e7d32" stroke-width="2"/>
  <line x1="690" y1="455" x2="780" y2="455" stroke="#2e7d32" stroke-width="2"/>
  <text x="735" y="442" text-anchor="middle" font-size="12" fill="#333">D3 配送库</text>

  <!-- Data flows -->
  <line x1="120" y1="115" x2="170" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="140" y="110" text-anchor="middle" font-size="11" fill="#333">登录/菜单请求</text>

  <line x1="170" y1="145" x2="120" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="140" y="165" text-anchor="middle" font-size="11" fill="#333">菜单/个人信息</text>

  <line x1="220" y1="180" x2="220" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="250" y="270" text-anchor="middle" font-size="11" fill="#333">读取菜单</text>

  <line x1="270" y1="140" x2="400" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="335" y="132" text-anchor="middle" font-size="11" fill="#333">选中菜品/下单</text>

  <line x1="450" y1="180" x2="450" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="480" y="275" text-anchor="middle" font-size="11" fill="#333">保存订单</text>

  <line x1="450" y1="180" x2="450" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="490" y="190" text-anchor="middle" font-size="11" fill="#333">待支付订单</text>

  <line x1="450" y1="310" x2="450" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="490" y="330" text-anchor="middle" font-size="11" fill="#333">支付确认</text>

  <line x1="405" y1="280" x2="360" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="380" y="300" text-anchor="middle" font-size="11" fill="#333">支付请求</text>

  <line x1="495" y1="280" x2="540" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="520" y="300" text-anchor="middle" font-size="11" fill="#333">支付结果</text>

  <line x1="500" y1="160" x2="630" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="570" y="165" text-anchor="middle" font-size="11" fill="#333">新订单</text>

  <line x1="730" y1="200" x2="825" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="790" y="165" text-anchor="middle" font-size="11" fill="#333">订单详情</text>

  <line x1="825" y1="145" x2="730" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="790" y="215" text-anchor="middle" font-size="11" fill="#333">出餐确认</text>

  <line x1="500" y1="160" x2="630" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="550" y="250" text-anchor="middle" font-size="11" fill="#333">配送请求</text>

  <line x1="730" y1="380" x2="730" y2="410" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="770" y="400" text-anchor="middle" font-size="11" fill="#333">保存配送信息</text>

  <line x1="730" y1="330" x2="825" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="790" y="285" text-anchor="middle" font-size="11" fill="#333">配送信息</text>

  <line x1="120" y1="360" x2="630" y2="345" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="360" y="365" text-anchor="middle" font-size="11" fill="#333">查询请求</text>

  <line x1="630" y1="345" x2="120" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#darr0)"/>
  <text x="360" y="385" text-anchor="middle" font-size="11" fill="#333">订单状态</text>
</svg>