<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <rect width="700" height="420" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">学生选课系统类图</text>
  
  <!-- Student class -->
  <rect x="80" y="70" width="160" height="110" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <rect x="80" y="70" width="160" height="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="160" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Student</text>
  <text x="90" y="112" font-size="12" fill="#333">- studentId: String</text>
  <text x="90" y="130" font-size="12" fill="#333">- name: String</text>
  <text x="90" y="148" font-size="12" fill="#333">- major: String</text>
  <line x1="85" y1="155" x2="235" y2="155" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="170" font-size="12" fill="#333">+ selectCourse()</text>
  
  <!-- Course class -->
  <rect x="450" y="70" width="160" height="110" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <rect x="450" y="70" width="160" height="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="530" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Course</text>
  <text x="460" y="112" font-size="12" fill="#333">- courseId: String</text>
  <text x="460" y="130" font-size="12" fill="#333">- name: String</text>
  <text x="460" y="148" font-size="12" fill="#333">- credits: int</text>
  <line x1="455" y1="155" x2="605" y2="155" stroke="#ddd" stroke-width="1"/>
  <text x="460" y="170" font-size="12" fill="#333">+ getInfo()</text>
  
  <!-- Selection class -->
  <rect x="265" y="260" width="160" height="110" fill="#fff" stroke="#ef6c00" stroke-width="2"/>
  <rect x="265" y="260" width="160" height="30" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="345" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Selection</text>
  <text x="275" y="302" font-size="12" fill="#333">- selectionId: String</text>
  <text x="275" y="320" font-size="12" fill="#333">- selectTime: Date</text>
  <text x="275" y="338" font-size="12" fill="#333">- grade: float</text>
  <line x1="270" y1="345" x2="420" y2="345" stroke="#ddd" stroke-width="1"/>
  <text x="275" y="360" font-size="12" fill="#333">+ withdraw()</text>
  
  <!-- Relationships -->
  <line x1="240" y1="125" x2="450" y2="125" stroke="#555" stroke-width="1.5"/>
  <text x="345" y="115" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="345" y="140" text-anchor="middle" font-size="12" fill="#333">*</text>
  
  <line x1="170" y1="180" x2="300" y2="260" stroke="#555" stroke-width="1.5"/>
  <text x="220" y="225" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="260" y="245" text-anchor="middle" font-size="12" fill="#333">*</text>
  
  <line x1="530" y1="180" x2="390" y2="260" stroke="#555" stroke-width="1.5"/>
  <text x="470" y="215" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="430" y="235" text-anchor="middle" font-size="12" fill="#333">*</text>
</svg>