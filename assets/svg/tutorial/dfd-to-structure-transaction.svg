<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <rect width="720" height="520" fill="#f8f9fa"/>
  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">事务型 DFD → 软件结构图</text>

  <defs>
    <marker id="trArr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Top: Transaction DFD -->
  <text x="360" y="55" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">事务型数据流图</text>

  <!-- Receiver -->
  <circle cx="120" cy="110" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="11" fill="#333">接收</text>
  <text x="120" y="118" text-anchor="middle" font-size="11" fill="#333">路径</text>

  <!-- Transaction center -->
  <circle cx="300" cy="110" r="45" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="300" y="105" text-anchor="middle" font-size="12" fill="#333">事务</text>
  <text x="300" y="120" text-anchor="middle" font-size="12" fill="#333">中心</text>

  <!-- Action paths -->
  <circle cx="480" cy="70" r="35" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="480" y="65" text-anchor="middle" font-size="11" fill="#333">动作1</text>
  <text x="480" y="78" text-anchor="middle" font-size="10" fill="#333">浏览菜单</text>

  <circle cx="480" cy="120" r="35" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="480" y="115" text-anchor="middle" font-size="11" fill="#333">动作2</text>
  <text x="480" y="128" text-anchor="middle" font-size="10" fill="#333">提交订单</text>

  <circle cx="480" cy="170" r="35" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="480" y="165" text-anchor="middle" font-size="11" fill="#333">动作3</text>
  <text x="480" y="178" text-anchor="middle" font-size="10" fill="#333">查询状态</text>

  <!-- External entity -->
  <rect x="30" y="90" width="60" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="60" y="115" text-anchor="middle" font-size="12" fill="#333">顾客</text>

  <!-- DFD flows -->
  <line x1="90" y1="110" x2="80" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#trArr)"/>
  <text x="70" y="100" text-anchor="middle" font-size="10" fill="#333">请求</text>

  <line x1="160" y1="110" x2="255" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#trArr)"/>
  <text x="210" y="100" text-anchor="middle" font-size="10" fill="#333">数据</text>

  <line x1="345" y1="95" x2="445" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#trArr)"/>
  <text x="400" y="75" text-anchor="middle" font-size="10" fill="#333">类型1</text>

  <line x1="345" y1="110" x2="445" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#trArr)"/>
  <text x="400" y="125" text-anchor="middle" font-size="10" fill="#333">类型2</text>

  <line x1="345" y1="125" x2="445" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#trArr)"/>
  <text x="400" y="155" text-anchor="middle" font-size="10" fill="#333">类型3</text>

  <!-- Arrow down -->
  <line x1="360" y1="220" x2="360" y2="250" stroke="#999" stroke-width="2" marker-end="url(#trArr)"/>
  <text x="400" y="238" text-anchor="middle" font-size="12" fill="#666">映射为结构图</text>

  <!-- Bottom: Structure chart -->
  <text x="360" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">软件结构图</text>

  <!-- Main transaction control -->
  <rect x="310" y="295" width="100" height="40" fill="#1565c0" stroke="#0d47a1" stroke-width="2" rx="4"/>
  <text x="360" y="320" text-anchor="middle" font-size="13" fill="#fff">事务控制</text>

  <!-- Sub controls -->
  <rect x="120" y="370" width="100" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="170" y="395" text-anchor="middle" font-size="12" fill="#333">接收控制</text>

  <rect x="310" y="370" width="100" height="40" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="4"/>
  <text x="360" y="395" text-anchor="middle" font-size="12" fill="#333">散转/调度</text>

  <!-- Action modules -->
  <rect x="500" y="340" width="80" height="35" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="540" y="362" text-anchor="middle" font-size="10" fill="#333">动作路径1</text>

  <rect x="500" y="390" width="80" height="35" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="540" y="412" text-anchor="middle" font-size="10" fill="#333">动作路径2</text>

  <rect x="500" y="440" width="80" height="35" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="540" y="462" text-anchor="middle" font-size="10" fill="#333">动作路径3</text>

  <!-- Structure lines -->
  <line x1="360" y1="335" x2="360" y2="355" stroke="#555" stroke-width="2"/>
  <line x1="170" y1="355" x2="540" y2="355" stroke="#555" stroke-width="2"/>
  <line x1="170" y1="355" x2="170" y2="370" stroke="#555" stroke-width="2"/>
  <line x1="360" y1="355" x2="360" y2="370" stroke="#555" stroke-width="2"/>
  <line x1="540" y1="355" x2="540" y2="370" stroke="#555" stroke-width="2"/>

  <line x1="540" y1="410" x2="540" y2="425" stroke="#555" stroke-width="1.5"/>
  <line x1="540" y1="425" x2="540" y2="425" stroke="#555" stroke-width="1.5"/>
  <line x1="500" y1="357" x2="500" y2="357" stroke="#555" stroke-width="1.5"/>
  <line x1="500" y1="425" x2="580" y2="425" stroke="#555" stroke-width="1.5"/>
  <line x1="500" y1="425" x2="500" y2="440" stroke="#555" stroke-width="1.5"/>
  <line x1="540" y1="425" x2="540" y2="440" stroke="#555" stroke-width="1.5"/>
  <line x1="580" y1="425" x2="580" y2="440" stroke="#555" stroke-width="1.5"/>

  <!-- Legend -->
  <text x="30" y="505" font-size="11" fill="#666">说明：事务型 DFD 映射为「事务控制 → 接收控制 + 散转 + 各动作路径模块」。</text>
</svg>