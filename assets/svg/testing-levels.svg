<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#f8f9fa"/>
  <text x="300" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">软件测试层次</text>
  
  <polygon points="300,70 500,150 500,310 100,310 100,150" fill="none" stroke="#1565c0" stroke-width="2"/>
  
  <rect x="220" y="260" width="160" height="40" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="300" y="285" text-anchor="middle" font-size="14" fill="#333">单元测试</text>
  
  <rect x="190" y="200" width="220" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="225" text-anchor="middle" font-size="14" fill="#333">集成测试</text>
  
  <rect x="160" y="140" width="280" height="40" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="300" y="165" text-anchor="middle" font-size="14" fill="#333">确认测试</text>
  
  <rect x="130" y="80" width="340" height="40" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="300" y="105" text-anchor="middle" font-size="14" fill="#333">系统测试 / 非功能测试</text>
  
  <text x="300" y="335" text-anchor="middle" font-size="13" fill="#666">自底向上，粒度逐渐变大</text>
</svg>