<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f8f9fa"/>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">图书馆管理系统用例图</text>
  
  <!-- System boundary -->
  <rect x="180" y="55" width="300" height="300" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="330" y="75" text-anchor="middle" font-size="14" fill="#1565c0">图书馆管理系统</text>
  
  <!-- Actors -->
  <g transform="translate(80,140)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="27" x2="20" y2="70" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="5" y2="100" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="35" y2="100" stroke="#555" stroke-width="2"/>
  </g>
  <text x="100" y="260" text-anchor="middle" font-size="14" fill="#555">读者</text>
  
  <g transform="translate(80,300)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="27" x2="20" y2="70" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="5" y2="100" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="35" y2="100" stroke="#555" stroke-width="2"/>
  </g>
  <text x="100" y="420" text-anchor="middle" font-size="14" fill="#555">图书管理员</text>
  
  <!-- Use cases -->
  <ellipse cx="330" cy="120" rx="70" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="330" y="125" text-anchor="middle" font-size="12" fill="#333">查询图书</text>
  
  <ellipse cx="330" cy="190" rx="70" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="330" y="195" text-anchor="middle" font-size="12" fill="#333">借阅图书</text>
  
  <ellipse cx="330" cy="260" rx="70" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="330" y="265" text-anchor="middle" font-size="12" fill="#333">归还图书</text>
  
  <ellipse cx="330" cy="330" rx="70" ry="25" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="330" y="335" text-anchor="middle" font-size="12" fill="#333">管理图书信息</text>
  
  <!-- Lines -->
  <line x1="140" y1="180" x2="260" y2="120" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="200" x2="260" y2="190" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="340" x2="260" y2="330" stroke="#555" stroke-width="1.5"/>
  <line x1="140" y1="360" x2="260" y2="260" stroke="#555" stroke-width="1.5"/>
</svg>