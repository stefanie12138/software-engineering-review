<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <rect width="700" height="300" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">快递包裹查询系统 0 层 DFD</text>

  <defs>
    <marker id="expArr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- External entities -->
  <rect x="50" y="110" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="100" y="140" text-anchor="middle" font-size="13" fill="#333">用户</text>

  <rect x="550" y="110" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="600" y="140" text-anchor="middle" font-size="13" fill="#333">快递员</text>

  <!-- Process -->
  <circle cx="350" cy="135" r="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="130" text-anchor="middle" font-size="13" fill="#333">快递包裹查询</text>
  <text x="350" y="148" text-anchor="middle" font-size="13" fill="#333">系统</text>

  <!-- Data store -->
  <rect x="300" y="220" width="100" height="50" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="300" y1="230" x2="400" y2="230" stroke="#2e7d32" stroke-width="2"/>
  <line x1="300" y1="270" x2="400" y2="270" stroke="#2e7d32" stroke-width="2"/>
  <text x="350" y="255" text-anchor="middle" font-size="12" fill="#333">D1 快递数据库</text>

  <!-- Data flows -->
  <line x1="150" y1="120" x2="290" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#expArr)"/>
  <text x="220" y="110" text-anchor="middle" font-size="12" fill="#333">快递单号</text>

  <line x1="410" y1="150" x2="550" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#expArr)"/>
  <text x="480" y="170" text-anchor="middle" font-size="12" fill="#333">物流信息</text>

  <line x1="550" y1="140" x2="410" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#expArr)"/>
  <text x="480" y="130" text-anchor="middle" font-size="12" fill="#333">扫描信息</text>

  <line x1="350" y1="195" x2="350" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#expArr)"/>
  <text x="390" y="210" text-anchor="middle" font-size="12" fill="#333">更新物流状态</text>
</svg>