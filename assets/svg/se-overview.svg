<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">软件工程核心框架</text>
  
  <!-- Center -->
  <ellipse cx="400" cy="140" rx="110" ry="45" fill="#1565c0" opacity="0.15" stroke="#1565c0" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">软件工程</text>
  
  <!-- Three elements -->
  <rect x="120" y="240" width="160" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="200" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#0d47a1">过程 Process</text>
  <text x="200" y="292" text-anchor="middle" font-size="12" fill="#333">步骤 · 次序 · 管理</text>
  
  <rect x="320" y="240" width="160" height="70" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#1b5e20">方法学 Methodology</text>
  <text x="400" y="292" text-anchor="middle" font-size="12" fill="#333">技术 · 方法 · 模型</text>
  
  <rect x="520" y="240" width="160" height="70" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="600" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">工具 Tool</text>
  <text x="600" y="292" text-anchor="middle" font-size="12" fill="#333">CASE · IDE · 自动化</text>
  
  <!-- Arrows -->
  <line x1="330" y1="175" x2="230" y2="235" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="185" x2="400" y2="235" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="175" x2="570" y2="235" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Lifecycle -->
  <text x="400" y="340" text-anchor="middle" font-size="14" fill="#555">需求 → 设计 → 实现 → 测试 → 维护</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
</svg>