<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350">
  <rect width="700" height="350" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">订单生命周期状态图</text>
  
  <!-- Start -->
  <circle cx="80" cy="175" r="8" fill="#555"/>
  <line x1="88" y1="175" x2="150" y2="175" stroke="#555" stroke-width="2" marker-end="url(#starr)"/>
  <text x="110" y="165" text-anchor="middle" font-size="11" fill="#333">创建</text>
  
  <!-- States -->
  <rect x="150" y="150" width="100" height="50" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" font-size="13" fill="#333">待支付</text>
  
  <line x1="250" y1="175" x2="340" y2="175" stroke="#555" stroke-width="2" marker-end="url(#starr)"/>
  <text x="295" y="165" text-anchor="middle" font-size="11" fill="#333">支付成功</text>
  
  <rect x="340" y="150" width="100" height="50" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="390" y="180" text-anchor="middle" font-size="13" fill="#333">待发货</text>
  
  <line x1="440" y1="175" x2="530" y2="175" stroke="#555" stroke-width="2" marker-end="url(#starr)"/>
  <text x="485" y="165" text-anchor="middle" font-size="11" fill="#333">发货</text>
  
  <rect x="530" y="150" width="100" height="50" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="580" y="180" text-anchor="middle" font-size="13" fill="#333">待收货</text>
  
  <!-- Cancel path -->
  <line x1="200" y1="200" x2="200" y2="260" stroke="#555" stroke-width="2" marker-end="url(#starr)"/>
  <text x="235" y="235" text-anchor="middle" font-size="11" fill="#333">取消/超时</text>
  
  <rect x="150" y="260" width="100" height="50" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="200" y="290" text-anchor="middle" font-size="13" fill="#333">已取消</text>
  
  <!-- Complete path -->
  <line x1="580" y1="200" x2="580" y2="260" stroke="#555" stroke-width="2" marker-end="url(#starr)"/>
  <text x="610" y="235" text-anchor="middle" font-size="11" fill="#333">确认收货</text>
  
  <rect x="530" y="260" width="100" height="50" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="580" y="290" text-anchor="middle" font-size="13" fill="#333">已完成</text>
  
  <!-- End -->
  <circle cx="655" cy="285" r="6" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="655" cy="285" r="3" fill="#555"/>
  <line x1="630" y1="285" x2="643" y2="285" stroke="#555" stroke-width="2"/>
  
  <defs>
    <marker id="starr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>