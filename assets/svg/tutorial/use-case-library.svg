<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <rect width="600" height="520" fill="#f8f9fa"/>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">图书馆管理系统用例图</text>

  <defs>
    <marker id="ucOpen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- System boundary -->
  <rect x="120" y="55" width="360" height="440" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="75" text-anchor="middle" font-size="14" fill="#1565c0">图书馆管理系统</text>

  <!-- Reader Actor -->
  <g transform="translate(60,170)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="27" x2="20" y2="70" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="5" y2="100" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="35" y2="100" stroke="#555" stroke-width="2"/>
  </g>
  <text x="80" y="290" text-anchor="middle" font-size="14" fill="#555">读者</text>

  <!-- Admin Actor -->
  <g transform="translate(520,170)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="27" x2="20" y2="70" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="5" y2="100" stroke="#555" stroke-width="2"/>
    <line x1="20" y1="70" x2="35" y2="100" stroke="#555" stroke-width="2"/>
  </g>
  <text x="540" y="290" text-anchor="middle" font-size="14" fill="#555">管理员</text>

  <!-- Reader use cases -->
  <ellipse cx="220" cy="120" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="125" text-anchor="middle" font-size="12" fill="#333">查询图书</text>

  <ellipse cx="220" cy="200" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="205" text-anchor="middle" font-size="12" fill="#333">借阅图书</text>

  <ellipse cx="220" cy="280" rx="65" ry="23" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="285" text-anchor="middle" font-size="12" fill="#333">归还图书</text>

  <!-- Admin use cases -->
  <ellipse cx="380" cy="120" rx="65" ry="23" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="380" y="125" text-anchor="middle" font-size="12" fill="#333">管理图书信息</text>

  <ellipse cx="380" cy="200" rx="65" ry="23" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="380" y="205" text-anchor="middle" font-size="12" fill="#333">管理读者信息</text>

  <ellipse cx="380" cy="280" rx="65" ry="23" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="380" y="285" text-anchor="middle" font-size="12" fill="#333">管理借阅记录</text>

  <!-- Include / Extend use cases -->
  <ellipse cx="300" cy="380" rx="65" ry="23" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="300" y="385" text-anchor="middle" font-size="12" fill="#333">检查库存</text>

  <ellipse cx="300" cy="460" rx="65" ry="23" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="300" y="465" text-anchor="middle" font-size="12" fill="#333">推荐预约</text>

  <!-- Association lines -->
  <line x1="120" y1="120" x2="155" y2="120" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="200" x2="155" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="280" x2="155" y2="280" stroke="#555" stroke-width="1.5"/>

  <line x1="445" y1="120" x2="480" y2="120" stroke="#555" stroke-width="1.5"/>
  <line x1="445" y1="200" x2="480" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="445" y1="280" x2="480" y2="280" stroke="#555" stroke-width="1.5"/>

  <!-- Include: 借阅图书 -> 检查库存 -->
  <line x1="220" y1="223" x2="300" y2="357" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ucOpen)"/>
  <text x="230" y="300" text-anchor="start" font-size="11" fill="#333">&lt;&lt;include&gt;&gt;</text>

  <!-- Extend: 推荐预约 -> 借阅图书 -->
  <line x1="300" y1="437" x2="220" y2="223" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ucOpen)"/>
  <text x="310" y="350" text-anchor="start" font-size="11" fill="#333">&lt;&lt;extend&gt;&gt;</text>
</svg>