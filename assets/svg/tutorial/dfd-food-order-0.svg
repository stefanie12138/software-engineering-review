<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" viewBox="0 0 700 280">
  <rect width="700" height="280" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">在线订餐系统 0 层 DFD</text>
  
  <!-- External entities -->
  <rect x="50" y="100" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="100" y="130" text-anchor="middle" font-size="13" fill="#333">顾客</text>
  
  <rect x="550" y="100" width="100" height="50" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="600" y="130" text-anchor="middle" font-size="13" fill="#333">商家</text>
  
  <!-- Process -->
  <circle cx="350" cy="125" r="55" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="120" text-anchor="middle" font-size="13" fill="#333">在线订餐</text>
  <text x="350" y="138" text-anchor="middle" font-size="13" fill="#333">系统</text>
  
  <!-- Data flows -->
  <line x1="150" y1="115" x2="295" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#darr)"/>
  <text x="220" y="105" text-anchor="middle" font-size="12" fill="#333">订单请求</text>
  
  <line x1="150" y1="145" x2="295" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#darr)"/>
  <text x="220" y="165" text-anchor="middle" font-size="12" fill="#333">支付信息</text>
  
  <line x1="405" y1="115" x2="550" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#darr)"/>
  <text x="480" y="105" text-anchor="middle" font-size="12" fill="#333">订单详情</text>
  
  <line x1="405" y1="145" x2="550" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#darr)"/>
  <text x="480" y="165" text-anchor="middle" font-size="12" fill="#333">配送信息</text>
  
  <defs>
    <marker id="darr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>