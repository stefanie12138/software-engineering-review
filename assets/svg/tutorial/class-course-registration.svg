<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <rect width="700" height="420" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">学生选课系统类图</text>

  <!-- Teacher class -->
  <rect x="270" y="60" width="160" height="100" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <rect x="270" y="60" width="160" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="350" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Teacher</text>
  <text x="280" y="102" font-size="12" fill="#333">- teacherId: String</text>
  <text x="280" y="120" font-size="12" fill="#333">- name: String</text>
  <line x1="275" y1="128" x2="425" y2="128" stroke="#ddd" stroke-width="1"/>
  <text x="280" y="143" font-size="12" fill="#333">+ teach()</text>

  <!-- Student class -->
  <rect x="80" y="200" width="160" height="110" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <rect x="80" y="200" width="160" height="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="160" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Student</text>
  <text x="90" y="242" font-size="12" fill="#333">- studentId: String</text>
  <text x="90" y="260" font-size="12" fill="#333">- name: String</text>
  <text x="90" y="278" font-size="12" fill="#333">- major: String</text>
  <line x1="85" y1="285" x2="235" y2="285" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="300" font-size="12" fill="#333">+ selectCourse()</text>

  <!-- Course class -->
  <rect x="460" y="200" width="160" height="110" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <rect x="460" y="200" width="160" height="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="540" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Course</text>
  <text x="470" y="242" font-size="12" fill="#333">- courseId: String</text>
  <text x="470" y="260" font-size="12" fill="#333">- name: String</text>
  <text x="470" y="278" font-size="12" fill="#333">- credits: int</text>
  <line x1="465" y1="285" x2="615" y2="285" stroke="#ddd" stroke-width="1"/>
  <text x="470" y="300" font-size="12" fill="#333">+ getInfo()</text>

  <!-- Selection class -->
  <rect x="270" y="320" width="160" height="90" fill="#fff" stroke="#ef6c00" stroke-width="2"/>
  <rect x="270" y="320" width="160" height="30" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="350" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Selection</text>
  <text x="280" y="362" font-size="12" fill="#333">- selectTime: Date</text>
  <text x="280" y="380" font-size="12" fill="#333">- grade: float</text>
  <line x1="275" y1="387" x2="425" y2="387" stroke="#ddd" stroke-width="1"/>
  <text x="280" y="402" font-size="12" fill="#333">+ withdraw()</text>

  <!-- Teacher -> Course (1..*) -->
  <line x1="350" y1="160" x2="540" y2="200" stroke="#555" stroke-width="1.5"/>
  <text x="420" y="172" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="490" y="195" text-anchor="middle" font-size="12" fill="#333">*</text>

  <!-- Student -> Selection (1..*) -->
  <line x1="240" y1="280" x2="270" y2="350" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="325" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="265" y="345" text-anchor="middle" font-size="12" fill="#333">*</text>

  <!-- Course -> Selection (1..*) -->
  <line x1="460" y1="280" x2="430" y2="350" stroke="#555" stroke-width="1.5"/>
  <text x="455" y="325" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="430" y="345" text-anchor="middle" font-size="12" fill="#333">*</text>
</svg>