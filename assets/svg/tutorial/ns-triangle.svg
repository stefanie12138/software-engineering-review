<svg xmlns="http://www.w3.org/2000/svg" width="500" height="420" viewBox="0 0 500 420">
  <rect width="500" height="420" fill="#f8f9fa"/>
  <text x="250" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">判断三角形类型 N-S 图</text>
  
  <!-- Start -->
  <rect x="120" y="50" width="260" height="35" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="73" text-anchor="middle" font-size="13" fill="#333">输入三条边 a, b, c</text>
  
  <!-- Condition 1 -->
  <rect x="100" y="100" width="300" height="40" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="250" y="125" text-anchor="middle" font-size="13" fill="#333">a+b&gt;c 且 a+c&gt;b 且 b+c&gt;a ?</text>
  
  <!-- True branch -->
  <rect x="100" y="140" width="140" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="170" y="160" text-anchor="middle" font-size="12" fill="#333">是：构成三角形</text>
  
  <!-- False branch -->
  <rect x="260" y="140" width="140" height="30" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="330" y="160" text-anchor="middle" font-size="12" fill="#333">否：输出"不能构成"</text>
  
  <!-- Condition 2 -->
  <rect x="100" y="185" width="140" height="40" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="170" y="210" text-anchor="middle" font-size="12" fill="#333">a==b 且 b==c ?</text>
  
  <!-- Equilateral -->
  <rect x="100" y="225" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="130" y="244" text-anchor="middle" font-size="11" fill="#333">等边</text>
  
  <!-- Isosceles check -->
  <rect x="180" y="225" width="60" height="30" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="210" y="244" text-anchor="middle" font-size="11" fill="#333">等腰?</text>
  
  <rect x="180" y="265" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="210" y="284" text-anchor="middle" font-size="11" fill="#333">等腰</text>
  
  <rect x="180" y="305" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="210" y="324" text-anchor="middle" font-size="11" fill="#333">普通</text>
  
  <!-- End -->
  <rect x="180" y="360" width="140" height="35" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="383" text-anchor="middle" font-size="13" fill="#333">输出结果，结束</text>
</svg>