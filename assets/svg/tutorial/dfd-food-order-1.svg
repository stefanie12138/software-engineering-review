<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">在线订餐系统 1 层 DFD</text>
  
  <!-- External entities -->
  <rect x="50" y="70" width="90" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="95" y="95" text-anchor="middle" font-size="13" fill="#333">顾客</text>
  
  <rect x="50" y="280" width="90" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="95" y="305" text-anchor="middle" font-size="13" fill="#333">支付平台</text>
  
  <rect x="660" y="70" width="90" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="705" y="95" text-anchor="middle" font-size="13" fill="#333">商家</text>
  
  <!-- Processes -->
  <circle cx="280" cy="100" r="45" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="280" y="95" text-anchor="middle" font-size="12" fill="#333">1.1</text>
  <text x="280" y="112" text-anchor="middle" font-size="12" fill="#333">浏览菜单</text>
  
  <circle cx="280" cy="200" r="45" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="280" y="195" text-anchor="middle" font-size="12" fill="#333">1.2</text>
  <text x="280" y="212" text-anchor="middle" font-size="12" fill="#333">提交订单</text>
  
  <circle cx="500" cy="200" r="45" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="500" y="195" text-anchor="middle" font-size="12" fill="#333">1.3</text>
  <text x="500" y="212" text-anchor="middle" font-size="12" fill="#333">支付处理</text>
  
  <circle cx="500" cy="300" r="45" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="500" y="295" text-anchor="middle" font-size="12" fill="#333">1.4</text>
  <text x="500" y="312" text-anchor="middle" font-size="12" fill="#333">通知商家</text>
  
  <!-- Data store -->
  <rect x="280" y="320" width="80" height="40" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="280" y1="330" x2="360" y2="330" stroke="#2e7d32" stroke-width="2"/>
  <line x1="280" y1="350" x2="360" y2="350" stroke="#2e7d32" stroke-width="2"/>
  <text x="320" y="347" text-anchor="middle" font-size="12" fill="#333">D1 订单库</text>
  
  <!-- Data flows (simplified) -->
  <line x1="140" y1="85" x2="235" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="190" y="80" text-anchor="middle" font-size="11" fill="#333">菜单请求</text>
  
  <line x1="325" y1="110" x2="235" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="265" y="150" text-anchor="middle" font-size="11" fill="#333">选中菜品</text>
  
  <line x1="325" y1="200" x2="455" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="390" y="190" text-anchor="middle" font-size="11" fill="#333">待支付订单</text>
  
  <line x1="140" y1="290" x2="455" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="260" y="265" text-anchor="middle" font-size="11" fill="#333">支付结果</text>
  
  <line x1="545" y1="220" x2="545" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="580" y="240" text-anchor="middle" font-size="11" fill="#333">订单确认</text>
  
  <line x1="545" y1="300" x2="660" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="620" y="190" text-anchor="middle" font-size="11" fill="#333">新订单</text>
  
  <line x1="320" y1="245" x2="320" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="350" y="290" text-anchor="middle" font-size="11" fill="#333">保存订单</text>
  
  <defs>
    <marker id="darr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>