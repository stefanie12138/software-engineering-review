<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">五种软件过程模型对比</text>
  
  <text x="120" y="80" font-size="16" font-weight="bold" fill="#333">瀑布模型</text>
  <rect x="80" y="95" width="140" height="40" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="80" y="145" width="140" height="40" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="80" y="195" width="140" height="40" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="150" y="120" text-anchor="middle" font-size="13" fill="#333">需求→设计→编码→测试</text>
  <text x="150" y="170" text-anchor="middle" font-size="12" fill="#555">顺序执行、阶段评审</text>
  <text x="150" y="220" text-anchor="middle" font-size="12" fill="#555">适合需求稳定项目</text>
  
  <text x="320" y="80" font-size="16" font-weight="bold" fill="#333">增量模型</text>
  <rect x="280" y="95" width="120" height="40" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="280" y="145" width="120" height="40" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="280" y="195" width="120" height="40" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="340" y="120" text-anchor="middle" font-size="13" fill="#333">增量1</text>
  <text x="340" y="170" text-anchor="middle" font-size="13" fill="#333">增量2</text>
  <text x="340" y="220" text-anchor="middle" font-size="13" fill="#333">增量N</text>
  <text x="340" y="255" text-anchor="middle" font-size="12" fill="#555">分块交付、可并行</text>
  
  <text x="500" y="80" font-size="16" font-weight="bold" fill="#333">迭代模型</text>
  <ellipse cx="530" cy="170" rx="70" ry="70" fill="none" stroke="#ef6c00" stroke-width="2"/>
  <text x="530" y="140" text-anchor="middle" font-size="13" fill="#333">迭代1</text>
  <text x="530" y="175" text-anchor="middle" font-size="13" fill="#333">迭代2</text>
  <text x="530" y="210" text-anchor="middle" font-size="13" fill="#333">迭代N</text>
  <text x="530" y="260" text-anchor="middle" font-size="12" fill="#555">小步快跑、逐步完善</text>
  
  <text x="680" y="80" font-size="16" font-weight="bold" fill="#333">原型模型</text>
  <rect x="650" y="100" width="120" height="45" rx="20" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="710" y="128" text-anchor="middle" font-size="13" fill="#333">快速原型</text>
  <text x="710" y="170" text-anchor="middle" font-size="12" fill="#555">用户反馈 → 精化需求</text>
  
  <text x="260" y="330" font-size="16" font-weight="bold" fill="#333">螺旋模型</text>
  <path d="M260,360 Q360,360 360,420 Q360,470 300,470 Q260,470 260,440 Q260,420 290,420 Q310,420 310,440" fill="none" stroke="#7b1fa2" stroke-width="2"/>
  <text x="310" y="390" text-anchor="middle" font-size="12" fill="#333">风险分析驱动</text>
  <text x="310" y="490" text-anchor="middle" font-size="12" fill="#555">每圈：计划→风险→工程→评估</text>
  
  <text x="560" y="330" font-size="16" font-weight="bold" fill="#333">选择建议</text>
  <text x="520" y="360" font-size="13" fill="#333">需求稳定 → 瀑布/增量</text>
  <text x="520" y="385" font-size="13" fill="#333">需求易变 → 迭代/原型</text>
  <text x="520" y="410" font-size="13" fill="#333">风险高 → 螺旋</text>
</svg>