<svg xmlns="http://www.w3.org/2000/svg" width="500" height="420" viewBox="0 0 500 420">
  <rect width="500" height="420" fill="#f8f9fa"/>
  <text x="250" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">控制流图示例</text>
  <text x="250" y="55" text-anchor="middle" font-size="13" fill="#666">代码：if (x&gt;0) y=x*2; else y=x+1; print(y);</text>
  
  <!-- Nodes -->
  <ellipse cx="250" cy="90" rx="40" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="250" y="95" text-anchor="middle" font-size="12" fill="#333">开始</text>
  
  <rect x="200" y="140" width="100" height="40" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="165" text-anchor="middle" font-size="12" fill="#333">输入 x</text>
  
  <polygon points="250,210 290,240 250,270 210,240" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="250" y="235" text-anchor="middle" font-size="12" fill="#333">x&gt;0?</text>
  
  <rect x="100" y="300" width="100" height="40" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="150" y="325" text-anchor="middle" font-size="12" fill="#333">y = x * 2</text>
  
  <rect x="300" y="300" width="100" height="40" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="350" y="325" text-anchor="middle" font-size="12" fill="#333">y = x + 1</text>
  
  <rect x="200" y="360" width="100" height="40" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="385" text-anchor="middle" font-size="12" fill="#333">输出 y</text>
  
  <!-- Edges -->
  <line x1="250" y1="115" x2="250" y2="140" stroke="#555" stroke-width="2" marker-end="url(#cfgarr)"/>
  <line x1="250" y1="180" x2="250" y2="210" stroke="#555" stroke-width="2" marker-end="url(#cfgarr)"/>
  <line x1="215" y1="255" x2="150" y2="300" stroke="#555" stroke-width="2" marker-end="url(#cfgarr)"/>
  <text x="170" y="270" text-anchor="middle" font-size="11" fill="#333">是</text>
  <line x1="285" y1="255" x2="350" y2="300" stroke="#555" stroke-width="2" marker-end="url(#cfgarr)"/>
  <text x="330" y="270" text-anchor="middle" font-size="11" fill="#333">否</text>
  <line x1="150" y1="340" x2="250" y2="360" stroke="#555" stroke-width="2" marker-end="url(#cfgarr)"/>
  <line x1="350" y1="340" x2="250" y2="360" stroke="#555" stroke-width="2" marker-end="url(#cfgarr)"/>
  
  <defs>
    <marker id="cfgarr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>