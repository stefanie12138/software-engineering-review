<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <rect width="1000" height="720" fill="#f8f9fa"/>
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">在线订餐系统 1 层 DFD</text>

  <defs>
    <marker id="darr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- External entities -->
  <rect x="30" y="70" width="90" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="75" y="95" text-anchor="middle" font-size="13" fill="#333">顾客</text>

  <rect x="880" y="70" width="90" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="925" y="95" text-anchor="middle" font-size="13" fill="#333">商家</text>

  <rect x="455" y="660" width="90" height="40" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="500" y="685" text-anchor="middle" font-size="13" fill="#333">支付平台</text>

  <!-- 1 顾客管理 -->
  <circle cx="180" cy="130" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="180" y="125" text-anchor="middle" font-size="11" fill="#333">1.1</text>
  <text x="180" y="140" text-anchor="middle" font-size="11" fill="#333">注册登录</text>

  <circle cx="180" cy="230" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="180" y="225" text-anchor="middle" font-size="11" fill="#333">1.2</text>
  <text x="180" y="240" text-anchor="middle" font-size="11" fill="#333">浏览菜单</text>

  <!-- 2 订单处理 -->
  <circle cx="420" cy="130" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="420" y="125" text-anchor="middle" font-size="11" fill="#333">2.1</text>
  <text x="420" y="140" text-anchor="middle" font-size="11" fill="#333">接收订单</text>

  <circle cx="420" cy="230" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="420" y="225" text-anchor="middle" font-size="11" fill="#333">2.2</text>
  <text x="420" y="240" text-anchor="middle" font-size="11" fill="#333">检查库存</text>

  <circle cx="420" cy="330" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="420" y="325" text-anchor="middle" font-size="11" fill="#333">2.3</text>
  <text x="420" y="340" text-anchor="middle" font-size="11" fill="#333">生成待支付订单</text>

  <circle cx="420" cy="430" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="420" y="425" text-anchor="middle" font-size="11" fill="#333">2.4</text>
  <text x="420" y="440" text-anchor="middle" font-size="11" fill="#333">确认订单</text>

  <!-- 3 支付处理 -->
  <circle cx="680" cy="230" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="680" y="225" text-anchor="middle" font-size="11" fill="#333">3.1</text>
  <text x="680" y="240" text-anchor="middle" font-size="11" fill="#333">发起支付</text>

  <circle cx="680" cy="330" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="680" y="325" text-anchor="middle" font-size="11" fill="#333">3.2</text>
  <text x="680" y="340" text-anchor="middle" font-size="11" fill="#333">验证支付</text>

  <!-- 4 厨房出餐 -->
  <circle cx="820" cy="150" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="820" y="145" text-anchor="middle" font-size="11" fill="#333">4.1</text>
  <text x="820" y="160" text-anchor="middle" font-size="11" fill="#333">发送订单</text>

  <circle cx="820" cy="250" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="820" y="245" text-anchor="middle" font-size="11" fill="#333">4.2</text>
  <text x="820" y="260" text-anchor="middle" font-size="11" fill="#333">接收出餐确认</text>

  <!-- 5 配送管理 -->
  <circle cx="820" cy="380" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="820" y="375" text-anchor="middle" font-size="11" fill="#333">5.1</text>
  <text x="820" y="390" text-anchor="middle" font-size="11" fill="#333">分配配送员</text>

  <circle cx="820" cy="480" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="820" y="475" text-anchor="middle" font-size="11" fill="#333">5.2</text>
  <text x="820" y="490" text-anchor="middle" font-size="11" fill="#333">更新配送状态</text>

  <circle cx="820" cy="580" r="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="820" y="575" text-anchor="middle" font-size="11" fill="#333">5.3</text>
  <text x="820" y="590" text-anchor="middle" font-size="11" fill="#333">处理查询</text>

  <!-- Data stores -->
  <rect x="120" y="540" width="90" height="40" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="120" y1="550" x2="210" y2="550" stroke="#2e7d32" stroke-width="2"/>
  <line x1="120" y1="580" x2="210" y2="580" stroke="#2e7d32" stroke-width="2"/>
  <text x="165" y="570" text-anchor="middle" font-size="12" fill="#333">D1 菜单库</text>

  <rect x="455" y="540" width="90" height="40" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="455" y1="550" x2="545" y2="550" stroke="#2e7d32" stroke-width="2"/>
  <line x1="455" y1="580" x2="545" y2="580" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="570" text-anchor="middle" font-size="12" fill="#333">D2 订单库</text>

  <rect x="790" y="650" width="90" height="40" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <line x1="790" y1="660" x2="880" y2="660" stroke="#2e7d32" stroke-width="2"/>
  <line x1="790" y1="690" x2="880" y2="690" stroke="#2e7d32" stroke-width="2"/>
  <text x="835" y="678" text-anchor="middle" font-size="12" fill="#333">D3 配送库</text>

  <!-- Key data flows (simplified for readability) -->
  <line x1="120" y1="85" x2="140" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="115" y="110" text-anchor="middle" font-size="10" fill="#333">登录/注册</text>

  <line x1="120" y1="95" x2="140" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="110" y="165" text-anchor="middle" font-size="10" fill="#333">菜单请求</text>

  <line x1="180" y1="270" x2="180" y2="540" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="210" y="410" text-anchor="middle" font-size="10" fill="#333">读取菜单</text>

  <line x1="220" y1="240" x2="380" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="290" y="180" text-anchor="middle" font-size="10" fill="#333">选中菜品/下单</text>

  <line x1="460" y1="140" x2="640" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="560" y="170" text-anchor="middle" font-size="10" fill="#333">待支付订单</text>

  <line x1="640" y1="270" x2="500" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="555" y="480" text-anchor="middle" font-size="10" fill="#333">支付请求</text>

  <line x1="500" y1="660" x2="640" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="545" y="520" text-anchor="middle" font-size="10" fill="#333">支付结果</text>

  <line x1="720" y1="250" x2="780" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="760" y="195" text-anchor="middle" font-size="10" fill="#333">新订单</text>

  <line x1="880" y1="110" x2="860" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="895" y="190" text-anchor="middle" font-size="10" fill="#333">出餐确认</text>

  <line x1="460" y1="430" x2="780" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="600" y="395" text-anchor="middle" font-size="10" fill="#333">配送请求</text>

  <line x1="820" y1="520" x2="835" y2="650" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="855" y="590" text-anchor="middle" font-size="10" fill="#333">保存配送</text>

  <line x1="120" y1="400" x2="780" y2="580" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="430" y="510" text-anchor="middle" font-size="10" fill="#333">查询请求</text>

  <line x1="780" y1="600" x2="120" y2="420" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="430" y="530" text-anchor="middle" font-size="10" fill="#333">订单状态</text>

  <!-- Internal flows within order processing -->
  <line x1="420" y1="170" x2="420" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="445" y="185" text-anchor="middle" font-size="10" fill="#333">订单信息</text>

  <line x1="420" y1="270" x2="420" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="460" y="285" text-anchor="middle" font-size="10" fill="#333">库存信息</text>

  <line x1="420" y1="370" x2="420" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="460" y="385" text-anchor="middle" font-size="10" fill="#333">待支付订单</text>

  <line x1="420" y1="470" x2="420" y2="540" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="455" y="510" text-anchor="middle" font-size="10" fill="#333">确认保存</text>

  <line x1="640" y1="330" x2="460" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#darr1)"/>
  <text x="530" y="400" text-anchor="middle" font-size="10" fill="#333">支付确认</text>

  <!-- Legend -->
  <text x="30" y="630" font-size="11" fill="#666">注：为保持清晰，1 层图仅画出主要数据流，部分往返读取/写入数据存储的细流已简化。</text>
</svg>