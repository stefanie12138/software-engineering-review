<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <rect width="600" height="320" fill="#f8f9fa"/>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">图书借阅系统 E-R 图</text>
  
  <!-- Entities -->
  <rect x="80" y="100" width="100" height="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" font-size="14" fill="#333">读者</text>
  
  <rect x="400" y="100" width="100" height="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" font-size="14" fill="#333">图书</text>
  
  <rect x="240" y="220" width="100" height="50" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="290" y="250" text-anchor="middle" font-size="14" fill="#333">借阅记录</text>
  
  <!-- Relationship diamond -->
  <polygon points="290,140 340,165 290,190 240,165" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="290" y="170" text-anchor="middle" font-size="12" fill="#333">借阅</text>
  
  <!-- Lines -->
  <line x1="180" y1="125" x2="240" y2="165" stroke="#555" stroke-width="1.5"/>
  <text x="205" y="140" text-anchor="middle" font-size="11" fill="#333">1</text>
  <line x1="340" y1="165" x2="400" y2="125" stroke="#555" stroke-width="1.5"/>
  <text x="375" y="140" text-anchor="middle" font-size="11" fill="#333">n</text>
  <line x1="290" y1="190" x2="290" y2="220" stroke="#555" stroke-width="1.5"/>
  
  <!-- Attributes -->
  <ellipse cx="130" cy="70" rx="45" ry="18" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="75" text-anchor="middle" font-size="11" fill="#333">读者ID</text>
  <line x1="130" y1="88" x2="130" y2="100" stroke="#555" stroke-width="1"/>
  
  <ellipse cx="80" cy="210" rx="45" ry="18" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="80" y="215" text-anchor="middle" font-size="11" fill="#333">姓名</text>
  <line x1="95" y1="196" x2="105" y2="150" stroke="#555" stroke-width="1"/>
  
  <ellipse cx="450" cy="70" rx="45" ry="18" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" font-size="11" fill="#333">ISBN</text>
  <line x1="450" y1="88" x2="450" y2="100" stroke="#555" stroke-width="1"/>
  
  <ellipse cx="520" cy="210" rx="45" ry="18" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="520" y="215" text-anchor="middle" font-size="11" fill="#333">书名</text>
  <line x1="505" y1="196" x2="480" y2="150" stroke="#555" stroke-width="1"/>
  
  <ellipse cx="380" cy="270" rx="45" ry="18" fill="#fff" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="380" y="275" text-anchor="middle" font-size="11" fill="#333">借阅日期</text>
  <line x1="365" y1="256" x2="320" y2="245" stroke="#555" stroke-width="1"/>
</svg>