<svg xmlns="http://www.w3.org/2000/svg" width="700" height="450" viewBox="0 0 700 450">
  <rect width="700" height="450" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">ATM 取款顺序图</text>
  
  <!-- Objects -->
  <text x="120" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">用户</text>
  <text x="280" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">ATM界面</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">银行系统</text>
  <text x="600" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">账户</text>
  
  <!-- Lifelines -->
  <line x1="120" y1="80" x2="120" y2="420" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="280" y1="80" x2="280" y2="420" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="440" y1="80" x2="440" y2="420" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="600" y1="80" x2="600" y2="420" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Activation bars -->
  <rect x="270" y="120" width="20" height="80" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <rect x="430" y="160" width="20" height="80" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <rect x="590" y="190" width="20" height="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <rect x="270" y="280" width="20" height="80" fill="#fff3e0" stroke="#ef6c00" stroke-width="1"/>
  <rect x="430" y="300" width="20" height="50" fill="#fff3e0" stroke="#ef6c00" stroke-width="1"/>
  
  <!-- Messages -->
  <line x1="120" y1="130" x2="270" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="195" y="122" text-anchor="middle" font-size="11" fill="#333">1: 插入银行卡、输入密码</text>
  
  <line x1="280" y1="170" x2="430" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="355" y="162" text-anchor="middle" font-size="11" fill="#333">2: 验证身份</text>
  
  <line x1="440" y1="210" x2="590" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="515" y="202" text-anchor="middle" font-size="11" fill="#333">3: 检查余额</text>
  
  <line x1="600" y1="230" x2="450" y2="230" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="520" y="245" text-anchor="middle" font-size="11" fill="#333">4: 返回余额</text>
  
  <line x1="440" y1="250" x2="290" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="360" y="265" text-anchor="middle" font-size="11" fill="#333">5: 身份验证通过</text>
  
  <line x1="120" y1="290" x2="270" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="195" y="282" text-anchor="middle" font-size="11" fill="#333">6: 输入取款金额</text>
  
  <line x1="280" y1="320" x2="430" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="355" y="312" text-anchor="middle" font-size="11" fill="#333">7: 扣减金额</text>
  
  <line x1="440" y1="340" x2="290" y2="340" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="360" y="355" text-anchor="middle" font-size="11" fill="#333">8: 返回成功</text>
  
  <line x1="280" y1="360" x2="130" y2="360" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sarr)"/>
  <text x="200" y="375" text-anchor="middle" font-size="11" fill="#333">9: 出钞、退卡</text>
  
  <defs>
    <marker id="sarr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>